version: 2

builds:
  - binary: eager-oom-killer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

dockers:
  - image_templates:
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
  - image_templates:
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    dockerfile: Dockerfile.goreleaser
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/duncan/eager-oom-killer:{{ .Version }}"
    image_templates:
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-amd64"
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-arm64"
  - name_template: "ghcr.io/duncan/eager-oom-killer:latest"
    image_templates:
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-amd64"
      - "ghcr.io/duncan/eager-oom-killer:{{ .Version }}-arm64"

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
